name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  packages: write

jobs:
  binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset: wf-x86_64-linux-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            asset: wf-aarch64-linux-musl
    steps:
      - uses: actions/checkout@v6
      - name: Install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
            echo "CC_aarch64_unknown_linux_musl=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          fi
      - name: Install Rust target
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/wf dist/${{ matrix.asset }}
          (cd dist && sha256sum ${{ matrix.asset }} > ${{ matrix.asset }}.sha256)
      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.asset }}
          path: dist/

  image:
    name: Build & push container image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute tags
        id: tags
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          {
            echo "tags=${IMAGE}:${GITHUB_REF_NAME},${IMAGE}:${VERSION},${IMAGE}:latest"
          } >> "$GITHUB_OUTPUT"
      - name: Build & push (linux/amd64 + linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.licenses=MIT

  release:
    needs: [binaries, image]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true
          pattern: wf-*
      - name: Create GitHub release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --notes-file <(echo "Container image: \`ghcr.io/${GITHUB_REPOSITORY,,}:${GITHUB_REF_NAME}\`") \
            dist/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
